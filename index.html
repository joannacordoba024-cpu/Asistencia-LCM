<script>
// URL de Apps Script unificada y validada
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8qrf5iTxl7JrgkFV_jt6QHVWIGol2bLpMo6dFzM4KpqPdt1s8I4rPlgN4Z6v4yFVn/exec";

// Coordenadas geográficas de las dos sedes del colegio
const SEDES_COLEGIO = [
  { lat: 4.607875, lon: -74.156550 }, // Sede Cra 90d
  { lat: 4.607212, lon: -74.157393 }  // Sede Calle 42
];

// Perímetro de tolerancia permitido en metros (Ampliado para mitigar errores de antena)
const RADIO_PERMITIDO_METROS = 120;  

// Genera un ID de dispositivo dinámico basado en el navegador actual
function obtenerOcrearDeviceId() {
  let id = localStorage.getItem("lcm_device_id");
  if (!id) {
    id = "DEV-" + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
    localStorage.setItem("lcm_device_id", id);
  }
  return id;
}

// Función matemática de Haversine para calcular distancia exacta en metros
function obtenerDistanciaMetros(lat1, lon1, lat2, lon2) {
  const R = 6371000; 
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function capturarYEnviar() {
  var nombre = document.getElementById("nombre").value;
  var accion = document.getElementById("accion").value;
  var statusDiv = document.getElementById("status");
  var boton = document.getElementById("btnRegistrar");

  if (!nombre) {
    alert("Por favor, selecciona tu nombre.");
    return;
  }

  // 📅 VALIDACIÓN LOCAL DE FIN DE SEMANA
  var fechaActual = new Date();
  var diaSemana = fechaActual.getDay(); // 0 = Domingo, 6 = Sábado
  if (diaSemana === 0 || diaSemana === 6) {
    statusDiv.innerHTML = "❌ Error: El registro de asistencia no está disponible los fines de semana.";
    statusDiv.style.color = "red";
    return;
  }

  statusDiv.innerHTML = "Obteniendo ubicación GPS obligatoria...";
  statusDiv.style.color = "#5f6368";
  boton.disabled = true;

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      var lat = position.coords.latitude;
      var lon = position.coords.longitude;
      
      // 📐 VALIDACIÓN DEL PERÍMETRO ESCOLAR (60 METROS)
      let enInstalaciones = false;
      for (let i = 0; i < SEDES_COLEGIO.length; i++) {
        let distancia = obtenerDistanciaMetros(lat, lon, SEDES_COLEGIO[i].lat, SEDES_COLEGIO[i].lon);
        if (distancia <= RADIO_PERMITIDO_METROS) {
          enInstalaciones = true;
          break;
        }
      }

      if (!enInstalaciones) {
        statusDiv.innerHTML = "❌ Error: Debes estar en las instalaciones del colegio para registrar asistencia.";
        statusDiv.style.color = "red";
        boton.disabled = false;
        return; 
      }
      
      statusDiv.innerHTML = "Validando transacciones de red...";
      
      var uId = obtenerOcrearDeviceId();

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ nombre: nombre, accion: accion, latitud: lat, longitud: lon, deviceId: uId })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "duplicate" || data.status === "device_blocked") {
          statusDiv.innerHTML = data.message;
          statusDiv.style.color = "orange";
        } else {
          statusDiv.innerHTML = "¡Registro enviado con éxito!";
          statusDiv.style.color = "green";
        }
        boton.disabled = false;
      })
      .catch(error => {
        statusDiv.innerHTML = "¡Procesando! Verifica tu registro en la hoja de cálculo.";
        statusDiv.style.color = "blue";
        boton.disabled = false;
      });

    }, function(error) {
      statusDiv.innerHTML = "❌ Error: Debes permitir el acceso al GPS para marcar asistencia.";
      statusDiv.style.color = "red";
      boton.disabled = false;
    }, { enableHighAccuracy: true });
  } else {
    statusDiv.innerHTML = "Tu dispositivo no soporta geolocalización.";
    boton.disabled = false;
  }
}
</script>
